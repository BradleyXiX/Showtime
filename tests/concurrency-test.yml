config:
  target: 'http://localhost:5000'
  phases:
    - duration: 1
      arrivalCount: 500 # Launch 500 concurrent virtual users at once
      name: "Concurrent Booking Surge"
  defaults:
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer YOUR_CLERK_JWT_TOKEN_HERE" # Replace with a valid Clerk JWT token

scenarios:
  - name: "Concurrent Seat Booking Scenarios"
    flow:
      - post:
          url: "/api/booking/create"
          json:
            showId: "6a60e60c180f0cea026f04a3" # Replace with a valid show ID from your database
            selectedSeats: ["A1"] # The exact seat being targeted concurrently (array of strings)
            expectedVersion: 0 # Expected version for Optimistic Concurrency Control (OCC)
          expect:
            # We expect exactly 1 request to return 200 and the other 499 requests to return 409
            - statusCode: [200, 409]
